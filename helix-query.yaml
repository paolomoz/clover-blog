version: 1

indices:
  # US-root listing index. Excludes the locale trees so Canadian content never
  # leaks into US listings/search and category filters don't cross-match.
  default:
    include:
      - '/**'
    exclude:
      - '/nav'
      - '/footer'
      - '/search'
      - '/drafts/**'
      - '/ca/**'
      - '/ca-fr/**'
    target: /query-index.json
    properties: &listing-props
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      image:
        select: head > meta[property="og:image"]
        value: match(attribute(el, 'content'), 'https:\/\/[^/]+(/.*)')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      tags:
        # 'Tags' metadata is pipeline-special (article:tag properties);
        # pages emit a plain 'Article Tags' row for indexing
        select: head > meta[name="article-tags"]
        value: attribute(el, 'content')
      template:
        select: head > meta[name="template"]
        value: attribute(el, 'content')
      publicationDate:
        select: head > meta[name="publication-date"]
        value: attribute(el, 'content')
      lastModified:
        select: none
        value: parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')

  # dedicated search index: same corpus, plus body text for full-text recall
  # (kept separate so the lean /query-index.json used by listings stays small)
  search:
    include:
      - '/**'
    exclude:
      - '/nav'
      - '/footer'
      - '/search'
      - '/drafts/**'
      - '/ca/**'
      - '/ca-fr/**'
    target: /search-index.json
    properties: &search-props
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      image:
        select: head > meta[property="og:image"]
        value: match(attribute(el, 'content'), 'https:\/\/[^/]+(/.*)')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      tags:
        select: head > meta[name="article-tags"]
        value: attribute(el, 'content')
      template:
        select: head > meta[name="template"]
        value: attribute(el, 'content')
      publicationDate:
        select: head > meta[name="publication-date"]
        value: attribute(el, 'content')
      # full-text recall: body prose of the article (WP search matches full
      # post content; median post is ~1100 words, so a 1200-word cap covers
      # ~91% of full-body matches — measured on the wp-cache corpus).
      text:
        select: 'main > div.article > p, main > div.article > ul, main > div.article > ol, main > div.article > blockquote, main > div.article > h2, main > div.article > h3, main > div.article > h4'
        value: words(textContent(el), 0, 1200)
      headings:
        select: 'main > div.article > h2, main > div.article > h3'
        values: textContent(el)

  # ---- en-CA (/ca) locale indices ----
  ca:
    include:
      - '/ca/**'
    exclude:
      - '/ca/nav'
      - '/ca/footer'
      - '/ca/search'
    target: /ca/query-index.json
    properties: *listing-props
  ca-search:
    include:
      - '/ca/**'
    exclude:
      - '/ca/nav'
      - '/ca/footer'
      - '/ca/search'
    target: /ca/search-index.json
    properties: *search-props

  # ---- fr-CA (/ca-fr) locale indices ----
  ca-fr:
    include:
      - '/ca-fr/**'
    exclude:
      - '/ca-fr/nav'
      - '/ca-fr/footer'
      - '/ca-fr/search'
    target: /ca-fr/query-index.json
    properties: *listing-props
  ca-fr-search:
    include:
      - '/ca-fr/**'
    exclude:
      - '/ca-fr/nav'
      - '/ca-fr/footer'
      - '/ca-fr/search'
    target: /ca-fr/search-index.json
    properties: *search-props
