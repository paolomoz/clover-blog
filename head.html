<!-- the header chrome is above the fold on every page: loading its (small)
     CSS up front guarantees the nav never paints unstyled (the block appends
     its DOM the moment the preloaded module + fragment resolve, which can
     beat a lazily-loaded stylesheet and shift the whole page) -->
<link rel="stylesheet" href="/blocks/header/header.css">
<script nonce="aem">
  // LCP kickstart: start downloading the page's hero/lead image as soon as
  // the DOM is parsed (readyState 'interactive'), well before the deferred
  // module pipeline decorates the page. The server-rendered markup ships
  // every content image as loading="lazy"; lazy images inside the
  // still-hidden body never start fetching, so on 4G the LCP request would
  // otherwise wait ~1.5s+ for scripts.js. Picks the first content image with
  // a real intrinsic width (skips icons/avatars).
  document.addEventListener('readystatechange', () => {
    const img = [...document.querySelectorAll('main picture > img[loading="lazy"]')]
      .find((i) => (parseInt(i.getAttribute('width'), 10) || 0) >= 400);
    if (img) {
      img.loading = 'eager';
      img.fetchPriority = 'high';
    }
  }, { once: true });
</script>
